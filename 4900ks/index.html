    { name: "The Last Of Us Part I", category: "Action", img: "The Last Of Us Part I.jpg" },

    { name: "Pokemon Scarlet", category: "RPG", img: "Pokemon Scarlet.avif" },
    { name: "Pokemon Violet", category: "RPG", img: "Pokemon Violet.avif" },
    { name: "Pokemon Sword", category: "RPG", img: "Pokemon Sword.avif" },
    { name: "Pokemon Shield", category: "RPG", img: "Pokemon Shield.avif" },
    { name: "Super Mario Bros Wonder", category: "Action", img: "Super Mario Bros Wonder.avif" },
    { name: "Super Mario 3D World", category: "Action", img: "Super Mario 3D World.webp" },
    { name: "Super Mario Odyssey", category: "Action", img: "Super Mario Odyssey.avif" },
    { name: "Mario Kart 8 Deluxe", category: "Sports", img: "Mario Kart 8 Deluxe.avif" },
    { name: "Palworld", category: "Adventure", img: "Palworld.jpeg" },
    { name: "Call Of Duty: Modern Warfare Remastered", category: "Action", img: "Call Of Duty Modern Warfare Remastered.jpg" },
    { name: "Marvel's Spider-Man Remastered", category: "Action", img: "Marvel Spider-Man Remastered.jpg" },
    { name: "Marvel's Spider-Man Miles Morales", category: "Action", img: "marvel spiderman miles morales.jpg" },
    { name: "God Of War Ragnork", category: "Action", img: "God Of War Ragnork.jpg" }
    
  ];

  // SCUM ကို Adventure ထဲထည့်ရန် mapping ပြင်မယ်
  for (let g of newGamesWithCategory) {
    if (g.name === "SCUM") g.category = "Adventure";
  }

  // Price Groups များ
  const price4900Games = originalGamesData.map(g => ({ ...g, price: 4900 }));
  const price15000Games = originalGamesData.map(g => ({ ...g, price: 15000 }));
  // 27500 အုပ်စု: မူရင်းဂိမ်းများ + ဂိမ်းသစ်များ (category mapping ပြုပြီးသား)
  const price27500Games = [
    ...originalGamesData.map(g => ({ ...g, price: 27500 })),
    ...newGamesWithCategory.map(g => ({ name: g.name, category: g.category, img: g.img, price: 27500 }))
  ];

  // Category မြန်မာလို ပြန်ဆိုရန်
  function getCategoryName(category) {
    const map = {
      "Action": "လှုပ်ရှားမှု (Action)",
      "RPG": "အခန်းကဏ္ဍ (RPG)",
      "Fighting": "တိုက်ပွဲ (Fighting)",
      "Horror": "ထိတ်လန့် (Horror)",
      "Simulation": "အတုယူမှု (Simulation)",
      "Strategy": "မဟာဗျူဟာ (Strategy)",
      "Adventure": "စွန့်စားခန်း (Adventure)",
      "Puzzle": "ပဟေဠိ (Puzzle)",
      "Sports": "အားကစား (Sports)",
      "Survival": "ရှင်သန်ရေး (Survival)"
    };
    return map[category] || category;
  }

  // Game Card HTML generator (ပုံပါရင်ပုံပြ၊ မပါရင် gradient)
  function getGameCardHTML(game) {
    const hasImage = game.img && game.img.trim() !== "";
    let imageHtml = "";
    if (hasImage) {
      imageHtml = `<img src="${game.img}" alt="${game.name}" loading="lazy">`;
    } else {
      let hash = 0;
      for(let i = 0; i < game.name.length; i++) { hash = ((hash<<5)-hash)+game.name.charCodeAt(i); hash |= 0; }
      const hue1 = Math.abs(hash % 360);
      const hue2 = (hue1 + 40) % 360;
      const gradient = `linear-gradient(135deg, hsl(${hue1}, 70%, 35%), hsl(${hue2}, 80%, 20%))`;
      let initials = game.name.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
      if(initials.length === 0) initials = "🎮";
      imageHtml = `<div style="position:absolute; top:0; left:0; width:100%; height:100%; background: ${gradient};"></div>
                   <div class="game-badge" style="bottom:8px; left:8px;"><i class="fas fa-gamepad"></i> ${initials}</div>`;
    }
    const priceFormatted = game.price.toLocaleString() + " ကျပ်";
    return `<div class="game-card">
              <div class="game-img" style="position: relative;">
                ${imageHtml}
                ${!hasImage ? '' : `<div class="game-badge"><i class="fas fa-image"></i> ပုံ</div>`}
              </div>
              <div class="game-info">
                <h3 title="${game.name}">${game.name}</h3>
                <div><span class="game-category-tag"><i class="fas fa-tag"></i> ${getCategoryName(game.category)}</span>
                <span class="price-badge"><i class="fas fa-coins"></i> ${priceFormatted}</span></div>
              </div>
            </div>`;
  }

  // State
  let activePrice = 4900;
  let searchTerm = "";

  function render() {
    let games = [];
    if (activePrice === 4900) games = [...price4900Games];
    else if (activePrice === 15000) games = [...price15000Games];
    else games = [...price27500Games];

    if (searchTerm.trim() !== "") {
      const lowerTerm = searchTerm.toLowerCase();
      games = games.filter(g => g.name.toLowerCase().includes(lowerTerm));
    }

    const container = document.getElementById("categoriesContainer");
    if (!container) return;
    if (games.length === 0) {
      container.innerHTML = `<div class="no-results"><i class="fas fa-skull-crossbones"></i> "${searchTerm}" အတွက် ဂိမ်းမတွေ့ပါ။</div>`;
      return;
    }

    // Group by category
    const grouped = new Map();
    games.forEach(g => {
      const cat = g.category;
      if (!grouped.has(cat)) grouped.set(cat, []);
      grouped.get(cat).push(g);
    });
    const order = ["Action","RPG","Fighting","Horror","Simulation","Strategy","Adventure","Puzzle","Sports","Survival"];
    let html = "";
    for (let cat of order) {
      const gameList = grouped.get(cat);
      if (gameList && gameList.length) {
        html += `<div class="category-section">
                  <div class="cat-header">
                    <h2><i class="fas fa-tag"></i> ${getCategoryName(cat)}</h2>
                    <span>${gameList.length} ဂိမ်း</span>
                  </div>
                  <div class="games-grid">`;
        gameList.forEach(game => { html += getGameCardHTML(game); });
        html += `</div></div>`;
      }
    }
    container.innerHTML = html;
  }

  // Price button events
  const btns = document.querySelectorAll(".price-btn");
  function setActiveButton(price) {
    btns.forEach(btn => {
      const btnPrice = parseInt(btn.getAttribute("data-price"));
      if (btnPrice === price) btn.classList.add("active");
      else btn.classList.remove("active");
    });
  }
  btns.forEach(btn => {
    btn.addEventListener("click", () => {
      activePrice = parseInt(btn.getAttribute("data-price"));
      setActiveButton(activePrice);
      render();
    });
  });

  // Search events
  const searchInput = document.getElementById("searchInput");
  const clearBtn = document.getElementById("clearSearchBtn");
  function updateSearch() {
    searchTerm = searchInput.value;
    render();
  }
  searchInput.addEventListener("input", updateSearch);
  clearBtn.addEventListener("click", () => {
    searchInput.value = "";
    searchTerm = "";
    render();
    searchInput.focus();
  });

  // Initial render
  setActiveButton(4900);
  render();
</script>
